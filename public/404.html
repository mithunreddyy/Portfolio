<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Mithun Reddy</title>
    <meta name="description" content="The page you're looking for doesn't exist. Return to Mithun Reddy's portfolio." />

    <!-- Fonts (same as main portfolio) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Hanken+Grotesk:wght@100..900&display=swap" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <style>
      /* ── Reset ── */
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      /* ── Design Tokens (matches portfolio dark theme) ── */
      :root {
        --bg: #080808;
        --ink: #f0f0f0;
        --muted: #a1a1a1;
        --accent: #3B82F6;
        --line: rgba(255, 255, 255, 0.05);
        --font-sans: "Hanken Grotesk", "Inter", ui-sans-serif, system-ui, sans-serif;
        --font-mono: "Geist Mono", "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
      }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font-sans);
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ── Subtle radial spotlight (same as portfolio) ── */
      body::after {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 50% -20%, var(--accent) 0%, transparent 50%);
        opacity: 0.05;
        pointer-events: none;
        z-index: 1;
      }

      /* ── Container ── */
      .error-container {
        position: relative;
        z-index: 10;
        text-align: center;
        padding: 2rem 1.5rem;
        max-width: 520px;
        animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── Error Code ── */
      .error-code {
        font-family: var(--font-mono);
        font-size: clamp(6rem, 18vw, 10rem);
        font-weight: 800;
        letter-spacing: -0.04em;
        line-height: 1;
        color: var(--ink);
        position: relative;
        display: inline-block;
        margin-bottom: 1rem;
      }

      /* Glitch layers */
      .error-code::before,
      .error-code::after {
        content: "404";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0.06;
      }

      .error-code::before {
        color: #ff3333;
        animation: glitch-1 3s infinite linear alternate-reverse;
      }

      .error-code::after {
        color: #33ccff;
        animation: glitch-2 3s infinite linear alternate-reverse;
      }

      @keyframes glitch-1 {
        0%, 90%, 100% { transform: translate(0); }
        92% { transform: translate(-3px, 2px); }
        94% { transform: translate(3px, -1px); }
        96% { transform: translate(-2px, -2px); }
        98% { transform: translate(2px, 1px); }
      }

      @keyframes glitch-2 {
        0%, 88%, 100% { transform: translate(0); }
        90% { transform: translate(3px, -2px); }
        93% { transform: translate(-3px, 1px); }
        95% { transform: translate(2px, 2px); }
        97% { transform: translate(-2px, -1px); }
      }

      /* ── Label ── */
      .error-label {
        font-family: var(--font-mono);
        font-size: 0.82rem;
        font-weight: 400;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 1.75rem;
      }

      /* ── Divider ── */
      .error-divider {
        width: 48px;
        height: 1px;
        background: var(--line);
        margin: 0 auto 1.75rem;
      }

      /* ── Message ── */
      .error-message {
        font-size: 1.05rem;
        line-height: 1.85;
        color: var(--muted);
        max-width: 400px;
        margin: 0 auto 2.5rem;
      }

      /* ── Home Link ── */
      .error-home {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        font-family: var(--font-mono);
        font-size: 0.82rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink);
        text-decoration: none;
        padding: 0.7rem 1.6rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .error-home:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.18);
        transform: translateY(-1px);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      }

      .error-home:active {
        transform: translateY(0);
      }

      .error-home svg {
        width: 14px;
        height: 14px;
        opacity: 0.7;
        transition: transform 0.3s ease, opacity 0.3s ease;
      }

      .error-home:hover svg {
        transform: translateX(-3px);
        opacity: 1;
      }

      /* ── Footer ── */
      .error-footer {
        position: fixed;
        bottom: 2rem;
        left: 0;
        right: 0;
        text-align: center;
        font-family: var(--font-mono);
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.15);
        z-index: 10;
      }

      /* ── Responsive ── */
      @media (max-width: 480px) {
        .error-container {
          padding: 1.5rem 1.25rem;
        }

        .error-message {
          font-size: 0.95rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <div class="error-code">404</div>
      <p class="error-label">Page Not Found</p>
      <div class="error-divider"></div>
      <p class="error-message">
        The page you're looking for doesn't exist or has been moved. Let's get you back on track.
      </p>
      <a href="/" class="error-home" id="return-home-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Return Home
      </a>
    </div>
    <footer class="error-footer">mithun reddy — portfolio</footer>
  </body>
</html>
